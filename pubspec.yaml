name: paperly
description: "Modular daily planner for ADHD adults."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.0
  riverpod: ^2.5.0

  # Local database
  drift: ^2.17.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Backend
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^13.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.0
  http: ^1.2.0

  # UI
  flutter_slidable: ^3.1.0
  google_sign_in: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.17.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
